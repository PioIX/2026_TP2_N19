                <input type="email" placeholder="Su Email" name="email" required style="margin: 10px; padding: 10px; width: 250px;">
                <textarea rows="5" cols="30" placeholder="Su consulta" name="message" required style="margin: 10px; padding: 10px; width: 250px;"></textarea>
                <button type="submit" style="padding: 10px 20px; cursor: pointer;">Enviar mensaje</button>
            </form>
        </section>
